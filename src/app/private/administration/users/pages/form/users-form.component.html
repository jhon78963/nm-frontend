@if (form) {
  <form [formGroup]="form" (ngSubmit)="buttonSaveUser()">
    <div class="p-fluid p-formgrid grid">
      <div class="col-12">
        <app-input-select
          placeholder="Cliente (tenant)"
          label="Cliente"
          controlName="tenantId"
          for="tenant"
          [options]="(tenantsList | async) ?? []"
          id="tenant"
          optionLabel="name"
          optionValue="id"></app-input-select>
      </div>
      <div class="col-12">
        <app-input-select
          placeholder="Rol (Spatie)"
          label="Rol"
          controlName="roleName"
          for="role"
          [options]="(roles | async) ?? []"
          id="role"
          optionLabel="name"
          optionValue="name"></app-input-select>
      </div>
      <div class="col-12">
        <app-input-select
          placeholder="Tienda (warehouse)"
          label="Tienda"
          controlName="warehouseId"
          for="warehouse"
          [options]="warehouses"
          id="warehouse"
          optionLabel="name"
          optionValue="id"></app-input-select>
      </div>
      <div class="col-12">
        <app-input-text
          placeholder="Ingrese nombres"
          label="Nombre"
          controlName="name"></app-input-text>
      </div>
      <div class="col-12">
        <app-input-text
          placeholder="Ingrese apellidos"
          label="Apellidos"
          controlName="surname"></app-input-text>
      </div>
      @if (userId === 0) {
        <div class="col-12">
          <app-input-text
            placeholder="Ingrese username"
            label="Username"
            controlName="username"></app-input-text>
        </div>
        <div class="col-12">
          <app-input-text
            placeholder="Ingrese email"
            label="Email"
            controlName="email"></app-input-text>
        </div>
      }
      <button
        type="submit"
        pButton
        label="Guardar"
        [disabled]="!isValid"></button>
    </div>
  </form>
}
