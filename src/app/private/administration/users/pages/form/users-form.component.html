@if (form) {
  <form [formGroup]="form" (ngSubmit)="buttonSaveUser()">
    <div class="p-fluid p-formgrid grid">
      <div class="col-12">
        <app-input-select
          placeholder="Cliente (tenant)"
          label="Cliente"
          controlName="tenantId"
          for="tenant"
          [options]="tenants"
          id="tenant"
          optionLabel="name"
          optionValue="id"></app-input-select>
      </div>
      <div class="col-12 field">
        <label for="roleName" class="block mb-1">Rol</label>
        <p-dropdown
          inputId="roleName"
          formControlName="roleName"
          [options]="roles"
          optionLabel="name"
          optionValue="name"
          placeholder="Selecciona un rol"
          styleClass="w-full"
          [showClear]="false">
        </p-dropdown>
        @if (form.get('roleName')?.invalid && form.get('roleName')?.touched) {
          <small class="p-error block mt-1">El campo Rol es requerido</small>
        }
      </div>
      <div class="col-12">
        <app-input-select
          placeholder="Tienda (warehouse)"
          label="Tienda"
          controlName="warehouseId"
          for="warehouse"
          [options]="warehouses"
          id="warehouse"
          optionLabel="name"
          optionValue="id"></app-input-select>
      </div>
      <div class="col-12">
        <app-input-text
          placeholder="Ingrese nombres"
          label="Nombre"
          controlName="name"></app-input-text>
      </div>
      <div class="col-12">
        <app-input-text
          placeholder="Ingrese apellidos"
          label="Apellidos"
          controlName="surname"></app-input-text>
      </div>
      @if (userId === 0) {
        <div class="col-12">
          <app-input-text
            placeholder="Ingrese username"
            label="Username"
            controlName="username"></app-input-text>
        </div>
        <div class="col-12">
          <app-input-text
            placeholder="Ingrese email"
            label="Email"
            controlName="email"></app-input-text>
        </div>
      }
      <button
        type="submit"
        pButton
        label="Guardar"
        [disabled]="!isValid"></button>
    </div>
  </form>
}
