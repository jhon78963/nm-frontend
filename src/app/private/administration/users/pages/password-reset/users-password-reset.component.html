@if (form) {
  <form [formGroup]="form" (ngSubmit)="buttonResetPassword()">
    <div class="p-fluid p-formgrid grid">
      @if (username) {
        <div class="col-12">
          <p class="text-color-secondary mt-0 mb-3">
            Restablecer contraseña para <strong>{{ username }}</strong>.
            El usuario deberá cambiarla en su próximo inicio de sesión.
          </p>
        </div>
      }

      <div class="col-12">
        <label for="new-password" class="block mb-2">Nueva contraseña</label>
        <p-password
          inputId="new-password"
          formControlName="password"
          placeholder="Nueva contraseña"
          [toggleMask]="true"
          [feedback]="true"
          styleClass="w-full"
          inputStyleClass="w-full"></p-password>
        @if (fieldError('password'); as err) {
          <small class="p-error block mt-1">{{ err }}</small>
        }
      </div>

      <div class="col-12">
        <label for="confirm-password" class="block mb-2">
          Confirmar contraseña
        </label>
        <p-password
          inputId="confirm-password"
          formControlName="passwordConfirmation"
          placeholder="Confirmar contraseña"
          [toggleMask]="true"
          [feedback]="false"
          styleClass="w-full"
          inputStyleClass="w-full"></p-password>
        @if (fieldError('passwordConfirmation'); as err) {
          <small class="p-error block mt-1">{{ err }}</small>
        }
      </div>

      <div class="col-12">
        <small class="text-color-secondary">{{ passwordHint() }}</small>
      </div>

      <button
        type="submit"
        pButton
        label="Restablecer contraseña"
        [disabled]="!isValid || isSaving"></button>
    </div>
  </form>
}
<p-toast />
