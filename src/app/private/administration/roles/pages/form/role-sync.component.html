<div class="flex flex-column gap-3 p-2" *ngIf="!loading; else loadingTpl">
  <label for="perms">Permisos</label>
  <p class="text-600 text-sm m-0">
    En el desplegable verás la descripción en español y debajo el código interno del permiso.
  </p>
  <p-multiSelect
    inputId="perms"
    [options]="permissionGroups"
    [(ngModel)]="selected"
    [group]="true"
    optionLabel="label"
    optionValue="value"
    optionGroupLabel="label"
    optionGroupChildren="items"
    [filter]="true"
    filterBy="label,value"
    display="chip"
    [style]="{ width: '100%' }"
    placeholder="Selecciona permisos"
    [showToggleAll]="true"
    appendTo="body">
    <ng-template let-opt pTemplate="item">
      <div class="flex flex-column gap-1">
        <span>{{ opt.label }}</span>
        <small class="text-500">{{ opt.value }}</small>
      </div>
    </ng-template>
  </p-multiSelect>
  <div class="flex justify-content-end gap-2">
    <p-button label="Cancelar" [text]="true" (click)="dynamicDialogRef.close()"></p-button>
    <p-button label="Sincronizar" icon="pi pi-sync" (click)="save()"></p-button>
  </div>
</div>
<ng-template #loadingTpl>
  <div class="p-4">Cargando permisos…</div>
</ng-template>
