<div [formGroup]="form" class="flex flex-column gap-3 p-2">
  <!-- ── Nombre del tenant ──────────────────────────────────────────────── -->
  <div class="field mb-0">
    <label class="font-semibold" for="name"
      >Nombre del tenant / sucursal *</label
    >
    <input
      id="name"
      type="text"
      pInputText
      class="w-full mt-1"
      formControlName="name"
      placeholder="Ej. Novedades Maritex" />
  </div>

  <p-divider align="left">
    <span class="text-sm font-semibold text-500">Identidad fiscal</span>
  </p-divider>

  <div class="grid">
    <div class="col-12 sm:col-4 field mb-0">
      <label for="ruc">RUC</label>
      <input
        id="ruc"
        type="text"
        pInputText
        class="w-full mt-1"
        formControlName="ruc"
        placeholder="20XXXXXXXXX"
        maxlength="11" />
    </div>
    <div class="col-12 sm:col-8 field mb-0">
      <label for="legalName">Razón social</label>
      <input
        id="legalName"
        type="text"
        pInputText
        class="w-full mt-1"
        formControlName="legalName"
        placeholder="Empresa S.A.C." />
    </div>
    <div class="col-12 field mb-0">
      <label for="tradeName">Nombre comercial</label>
      <input
        id="tradeName"
        type="text"
        pInputText
        class="w-full mt-1"
        formControlName="tradeName"
        placeholder="Nombre que aparece en el ticket" />
    </div>
  </div>

  <p-divider align="left">
    <span class="text-sm font-semibold text-500">Dirección fiscal</span>
  </p-divider>

  <div class="grid">
    <div class="col-12 field mb-0">
      <label for="address">Dirección</label>
      <input
        id="address"
        type="text"
        pInputText
        class="w-full mt-1"
        formControlName="address"
        placeholder="Calle / Av. / Mercado y número" />
    </div>
    <div class="col-12 sm:col-4 field mb-0">
      <label for="district">Distrito</label>
      <input
        id="district"
        type="text"
        pInputText
        class="w-full mt-1"
        formControlName="district"
        placeholder="Trujillo" />
    </div>
    <div class="col-12 sm:col-4 field mb-0">
      <label for="province">Provincia</label>
      <input
        id="province"
        type="text"
        pInputText
        class="w-full mt-1"
        formControlName="province"
        placeholder="Trujillo" />
    </div>
    <div class="col-12 sm:col-4 field mb-0">
      <label for="department">Departamento</label>
      <input
        id="department"
        type="text"
        pInputText
        class="w-full mt-1"
        formControlName="department"
        placeholder="La Libertad" />
    </div>
  </div>

  <p-divider align="left">
    <span class="text-sm font-semibold text-500">Contacto</span>
  </p-divider>

  <div class="grid">
    <div class="col-12 sm:col-4 field mb-0">
      <label for="phone">Teléfono / Celular</label>
      <input
        id="phone"
        type="text"
        pInputText
        class="w-full mt-1"
        formControlName="phone"
        placeholder="944 000 000" />
    </div>
    <div class="col-12 sm:col-8 field mb-0">
      <label for="email">Correo</label>
      <input
        id="email"
        type="email"
        pInputText
        class="w-full mt-1"
        formControlName="email"
        placeholder="contacto@empresa.com" />
    </div>
    <div class="col-12 field mb-0">
      <label for="website">Página web</label>
      <input
        id="website"
        type="url"
        pInputText
        class="w-full mt-1"
        formControlName="website"
        placeholder="https://www.empresa.com" />
    </div>
  </div>

  <p-divider align="left">
    <span class="text-sm font-semibold text-500">Redes sociales</span>
  </p-divider>

  <div class="grid">
    <div class="col-12 sm:col-4 field mb-0">
      <label for="facebook">
        <i class="pi pi-facebook mr-1"></i>Facebook
      </label>
      <input
        id="facebook"
        type="text"
        pInputText
        class="w-full mt-1"
        formControlName="facebook"
        placeholder="/NombreDePagina" />
    </div>
    <div class="col-12 sm:col-4 field mb-0">
      <label for="instagram">
        <i class="pi pi-instagram mr-1"></i>Instagram
      </label>
      <input
        id="instagram"
        type="text"
        pInputText
        class="w-full mt-1"
        formControlName="instagram"
        placeholder="@usuario" />
    </div>
    <div class="col-12 sm:col-4 field mb-0">
      <label for="tiktok"> <i class="pi pi-tiktok mr-1"></i>TikTok </label>
      <input
        id="tiktok"
        type="text"
        pInputText
        class="w-full mt-1"
        formControlName="tiktok"
        placeholder="@usuario" />
    </div>
  </div>

  <p-divider align="left">
    <span class="text-sm font-semibold text-500">Configuración del ticket</span>
  </p-divider>

  <div class="grid">
    <div class="col-12 field mb-0">
      <label for="logoUrl">URL del logo</label>
      <input
        id="logoUrl"
        type="url"
        pInputText
        class="w-full mt-1"
        formControlName="logoUrl"
        placeholder="https://cdn.mitienda.com/logo.png" />
      <small class="text-500"
        >URL pública de la imagen (JPG/PNG, fondo blanco recomendado).</small
      >
    </div>
    <div class="col-12 field mb-0">
      <label for="ticketFooterNote">Nota al pie del ticket</label>
      <input
        id="ticketFooterNote"
        type="text"
        pInputText
        class="w-full mt-1"
        formControlName="ticketFooterNote"
        placeholder="No se aceptan cambios ni devoluciones" />
    </div>
  </div>

  <!-- ── Acciones ───────────────────────────────────────────────────────── -->
  <div class="flex justify-content-end gap-2 mt-2">
    <p-button
      label="Cancelar"
      [text]="true"
      (click)="dynamicDialogRef.close()"></p-button>
    <p-button label="Guardar" [disabled]="!isValid" (click)="save()"></p-button>
  </div>
</div>
