@if (form) {
  <form [formGroup]="form" (ngSubmit)="buttonSaveTeam()">
    <div class="p-fluid p-formgrid grid">
      <div class="col-12">
        <app-input-text
          placeholder="8 dígitos"
          label="DNI"
          controlName="dni"></app-input-text>
      </div>
      <div class="col-12">
        <app-input-text
          placeholder="Nombres"
          label="Nombres"
          controlName="name"></app-input-text>
      </div>
      <div class="col-12">
        <app-input-text
          placeholder="Apellidos"
          label="Apellidos"
          controlName="surname"></app-input-text>
      </div>
      <div class="col-12">
        <app-input-text
          placeholder="Opcional"
          label="Salario"
          controlName="salary"></app-input-text>
      </div>
      <div class="col-12">
        <app-input-select
          placeholder="Seleccione tienda"
          label="Tienda (sucursal)"
          controlName="warehouseId"
          for="warehouse"
          [options]="warehouses"
          id="warehouse"
          optionLabel="name"
          optionValue="id"></app-input-select>
      </div>
      <p *ngIf="!isEdit" class="col-12 text-600 text-sm m-0">
        Al crear un colaborador se genera un usuario con rol
        <strong>Vendedora</strong>
        para iniciar sesión; recibirás el correo y la contraseña temporal al
        guardar.
      </p>
      <button
        type="submit"
        pButton
        label="Guardar"
        class="mt-3"
        [disabled]="!isValid"></button>
    </div>
  </form>
}
