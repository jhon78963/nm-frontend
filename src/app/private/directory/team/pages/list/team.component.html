<div class="card">
  <div class="flex justify-content-between align-items-center mt-3 gap-3">
    <app-input-search
      class="w-full md:w-3"
      [formGroup]="formGroup"
      controlName="search"
      (clearFilter)="clearFilter()">
    </app-input-search>
    <div class="flex align-items-center gap-2 flex-shrink-0">
      <p-button
        [outlined]="true"
        type="button"
        icon="pi pi-calendar-plus"
        pTooltip="Resumen diario de todas las colaboradoras"
        tooltipPosition="bottom"
        (click)="openTeamDailySummary()"></p-button>
      @if (team | async; as teamRows) {
        @if (teamRows.length > 0) {
          <p-button
            [outlined]="true"
            type="button"
            icon="pi pi-wallet"
            pTooltip="Pagos de la primera colaboradora en esta página (usa el ícono de cartera en cada fila para elegir otra)"
            tooltipPosition="bottom"
            [routerLink]="['/directory/team/pagos', teamRows[0].id]"></p-button>
        }
      }
      <p-button [outlined]="true" type="button" (click)="buttonAddTeam()">
        <i class="pi pi-plus" style="font-size: 1rem"></i>
      </p-button>
    </div>
  </div>
  <app-table-pagination
    [data]="(team | async) ?? []"
    [columns]="columns"
    [callToAction]="callToAction"
    [cellToAction]="cellToAction"
    [total]="(total | async) ?? 0"
    [limit]="limit"
    (paginateSelected)="onPageSelected($event)"
    [rowsPerPageOptions]="[10, 20, 50]"></app-table-pagination>
  <p-toast />
  <p-confirmDialog></p-confirmDialog>
</div>
