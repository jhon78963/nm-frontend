    <!--
      SEC-022 — CSP en desarrollo (ng serve). Producción: header nginx (deploy/nginx.conf.example).
      style-src 'unsafe-inline': requerido por Angular (estilos de componente) y PrimeNG (temas dinámicos).
      Ver docs/CSP.md para plan de reducción y alineación con producción.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' https://unpkg.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; font-src 'self' data: https://cdnjs.cloudflare.com https://unpkg.com; img-src 'self' data: blob: http://127.0.0.1:3050 http://localhost:8000 http://192.168.1.40:8000 https://upload.novedadesmaritex.net.pe https://api.novedadesmaritex.net.pe https://api-ecommerce.novedadesmaritex.net.pe; connect-src 'self' http://localhost:8000 http://192.168.1.40:8000 http://127.0.0.1:3050 ws://localhost:4200 wss://localhost:4200 ws://192.168.1.40:4200 wss://192.168.1.40:4200 https://api.novedadesmaritex.net.pe https://upload.novedadesmaritex.net.pe; frame-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self';" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link
      id="theme-link"
      rel="stylesheet"
      type="text/css"
      href="assets/layout/styles/theme/theme-light/yellow/theme.css" />
